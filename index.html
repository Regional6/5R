<!DOCTYPE html>

<head>

<title>Checklist 5R Mitra10</title>
<style>
  :root{
    --navy:#0B2C6B;
    --navy-dark:#081D49;
    --navy-light:#eef2fa;
    --paper:#ffffff;
    --bg:#f4f6fb;
    --ink:#1b2534;
    --muted:#6b7688;
    --line:#e1e6f0;
    --ringkas:#E53935;
    --rapi:#1E88E5;
    --resik:#43A047;
    --rawat:#FB8C00;
    --rajin:#8E24AA;
    --radius:14px;
    --shadow:0 2px 10px rgba(11,44,107,.08), 0 1px 2px rgba(11,44,107,.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    background:var(--bg);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:900px;margin:0 auto;min-height:100vh;padding-bottom:40px;}

  /* Header */
  .topbar{
    background:linear-gradient(135deg,var(--navy) 0%,var(--navy-dark) 100%);
    color:#fff;
    padding:18px 20px;
    position:sticky;top:0;z-index:20;
    box-shadow:var(--shadow);
  }
  .topbar-inner{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .logo{
    display:flex;align-items:center;gap:10px;
  }
  .logo img{
    width:40px;height:40px;border-radius:50%;object-fit:cover;
    box-shadow:0 0 0 2px rgba(255,255,255,.5);
    background:#fff;
  }
  .logo .logo-text{font-weight:800;font-size:16px;letter-spacing:.3px;color:#fff;line-height:1.2;}
  .logo .logo-text small{display:block;font-weight:500;font-size:10.5px;opacity:.8;letter-spacing:.5px;}
  .topbar-title{font-size:13px;opacity:.85;font-weight:500;}
  .breadcrumb{
    margin-top:10px;font-size:12.5px;color:#cfdaf5;display:flex;flex-wrap:wrap;gap:6px;align-items:center;
  }
  .breadcrumb b{color:#fff;font-weight:600;}
  .breadcrumb .sep{opacity:.5;}

  /* Card / step layout */
  .step-wrap{padding:28px 18px 10px;}
  .card{
    background:var(--paper);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:26px 22px;
    margin-bottom:18px;
  }
  .card h2{margin:0 0 6px;font-size:19px;color:var(--navy-dark);}
  .card p.hint{margin:0 0 20px;color:var(--muted);font-size:13.5px;}
  label.field-label{display:block;font-size:13px;font-weight:600;color:var(--navy-dark);margin-bottom:6px;}
  select, input[type=text], input[type=date], input[type=time]{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1.5px solid var(--line);
    background:#fbfcff;
    font-size:15px;
    color:var(--ink);
    appearance:none;
    -webkit-appearance:none;
  }
  select:focus, input:focus{outline:2px solid var(--navy);outline-offset:1px;border-color:var(--navy);}
  .select-wrap{position:relative;}
  .select-wrap::after{
    content:"▾";position:absolute;right:14px;top:50%;transform:translateY(-50%);
    color:var(--navy);pointer-events:none;font-size:14px;
  }
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:var(--navy);color:#fff;border:none;border-radius:10px;
    padding:13px 22px;font-size:15px;font-weight:600;cursor:pointer;
    width:100%;margin-top:20px;transition:background .15s ease, transform .05s ease;
  }
  .btn:hover{background:var(--navy-dark);}
  .btn:active{transform:scale(.99);}
  .btn:disabled{background:#c6cde0;cursor:not-allowed;}
  .btn-secondary{
    background:#fff;color:var(--navy);border:1.5px solid var(--navy);
  }
  .btn-secondary:hover{background:var(--navy-light);}
  .btn-row{display:flex;gap:10px;}
  .btn-row .btn{margin-top:20px;}
  .back-link{
    display:inline-flex;align-items:center;gap:6px;color:var(--navy);font-size:13.5px;
    font-weight:600;cursor:pointer;margin-bottom:16px;background:none;border:none;padding:0;
  }
  .back-link:hover{text-decoration:underline;}

  .choice-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:4px;}
  .choice-btn{
    display:flex;align-items:center;justify-content:space-between;
    padding:15px 16px;border-radius:12px;border:1.5px solid var(--line);
    background:#fbfcff;cursor:pointer;font-size:15px;font-weight:600;color:var(--ink);
    transition:border-color .15s, background .15s;
  }
  .choice-btn:hover{border-color:var(--navy);background:var(--navy-light);}
  .choice-btn .arrow{color:var(--navy);font-size:18px;}
  .choice-btn .num{
    display:inline-flex;align-items:center;justify-content:center;
    width:26px;height:26px;border-radius:8px;background:var(--navy);color:#fff;
    font-size:12.5px;margin-right:12px;flex:none;
  }
  .choice-btn .txt{display:flex;align-items:center;}

  /* Checklist screen */
  .checklist-header{
    background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);
    padding:20px 20px 16px;margin:20px 18px 14px;
  }
  .checklist-header h1{font-size:19px;margin:0 0 4px;color:var(--navy-dark);}
  .checklist-header .meta{font-size:13px;color:var(--muted);display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;}
  .checklist-header .meta b{color:var(--ink);}
  .legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .legend span{
    font-size:11.5px;padding:4px 10px;border-radius:20px;color:#fff;font-weight:600;
  }

  .section-block{
    background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);
    margin:0 18px 16px;overflow:hidden;
  }
  .section-title{
    padding:14px 18px;color:#fff;font-weight:700;font-size:14.5px;
    display:flex;justify-content:space-between;align-items:center;
  }
  .section-score{font-size:12.5px;font-weight:700;background:rgba(255,255,255,.22);padding:3px 10px;border-radius:20px;}
  table.grid-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.grid-table th, table.grid-table td{
    border-bottom:1px solid var(--line);padding:8px 6px;text-align:center;
  }
  table.grid-table th{background:#f7f9fd;color:var(--navy-dark);font-weight:700;font-size:11px;}
  table.grid-table td.item-name{text-align:left;padding-left:14px;font-size:12.5px;color:var(--ink);}
  table.grid-table td.item-no{color:var(--muted);width:26px;}
  table.grid-table input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--navy);}
  table.grid-table tr:nth-child(even) td{background:#fbfcff;}
  .colhead-ringkas{color:var(--ringkas);} .colhead-rapi{color:var(--rapi);}
  .colhead-resik{color:var(--resik);} .colhead-rawat{color:var(--rawat);} .colhead-rajin{color:var(--rajin);}

  .total-card{
    background:var(--navy-dark);color:#fff;border-radius:var(--radius);
    margin:0 18px 20px;padding:20px;text-align:center;
  }
  .total-card .score-big{font-size:38px;font-weight:800;}
  .total-card .score-label{font-size:13px;opacity:.85;margin-top:2px;}
  .kriteria-pill{
    display:inline-block;margin-top:10px;padding:5px 16px;border-radius:20px;font-size:13px;font-weight:700;
  }

  /* Comersil daily/weekly/monthly style */
  .group-block{margin:0 18px 16px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  .group-head{padding:12px 16px;color:#fff;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;}
  .group-items{padding:6px 16px 10px;}
  .g-item{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:10px 4px;border-bottom:1px dashed var(--line);font-size:13.5px;
  }
  .g-item:last-child{border-bottom:none;}
  .g-item input[type=checkbox]{width:20px;height:20px;accent-color:var(--navy);cursor:pointer;flex:none;}

  .corrective-table, .autho-block{margin:0 18px 16px;}
  .corrective-table table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);}
  .corrective-table th, .corrective-table td{border:1px solid var(--line);padding:8px;font-size:12.5px;}
  .corrective-table th{background:var(--navy);color:#fff;font-weight:600;}
  .corrective-table input{border:none;width:100%;font-size:12.5px;padding:4px;background:transparent;}
  .corrective-table input:focus{outline:1px solid var(--navy);border-radius:4px;}

  .autho-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:600px){.autho-grid{grid-template-columns:1fr;}}
  .autho-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;}
  .autho-card h4{margin:0 0 10px;color:var(--navy-dark);font-size:13.5px;}
  .autho-card label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px;}

  .kelulusan-legend{display:flex;flex-wrap:wrap;gap:8px;margin:0 18px 20px;}
  .kelulusan-legend span{font-size:11.5px;padding:5px 12px;border-radius:20px;color:#fff;font-weight:700;}

  .footer-actions{
    position:sticky;bottom:0;background:#fff;border-top:1px solid var(--line);
    padding:12px 18px;display:flex;gap:8px;box-shadow:0 -4px 14px rgba(0,0,0,.06);
  }
  .footer-actions .btn{margin-top:0;padding:13px 8px;font-size:13.5px;}
  @media(max-width:420px){
    .footer-actions{flex-wrap:wrap;}
    .footer-actions .btn{flex:1 1 100%;}
  }

  /* Carousel 5R */
  .carousel-wrap{padding:0 18px 24px;}
  .carousel-heading{font-size:13px;font-weight:700;color:var(--navy-dark);letter-spacing:.4px;margin:0 0 10px 4px;text-transform:uppercase;}
  .carousel-track{
    display:flex;gap:12px;overflow-x:auto;scroll-snap-type:none;
    padding-bottom:8px;-webkit-overflow-scrolling:touch;
  }
  .carousel-track::-webkit-scrollbar{height:6px;}
  .carousel-track::-webkit-scrollbar-thumb{background:#c7d0e6;border-radius:10px;}
  .carousel-slide{
    flex:0 0 auto;width:150px;scroll-snap-align:start;
    background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);
    overflow:hidden;
  }
  .carousel-slide img{width:100%;height:150px;object-fit:cover;display:block;}
  .carousel-slide .cs-body{padding:10px 10px 12px;}
  .carousel-slide .cs-num{
    display:inline-flex;align-items:center;justify-content:center;
    width:20px;height:20px;border-radius:6px;color:#fff;font-size:11px;font-weight:800;
  }
  .carousel-slide .cs-title{font-size:13.5px;font-weight:800;color:var(--navy-dark);margin:6px 0 3px;}
  .carousel-slide .cs-desc{font-size:11px;color:var(--muted);line-height:1.35;}
  .carousel-dots{display:flex;justify-content:center;gap:6px;margin-top:10px;}
  .carousel-dots span{width:6px;height:6px;border-radius:50%;background:#d3dbee;transition:background .2s,width .2s;}
  .carousel-dots span.active{background:var(--navy);width:16px;border-radius:4px;}

  @media print{
    .topbar, .footer-actions, .btn, .back-link{display:none !important;}
    body{background:#fff;}
    .section-block, .checklist-header, .total-card, .group-block, .corrective-table, .autho-block{box-shadow:none;border:1px solid #ccc;}
  }
  .app-footer{
    text-align:center;font-size:11px;color:#9aa4b8;padding:14px 10px 22px;
  }
  @media print{ .app-footer{display:none !important;} }
</style>
</head>

function sectionColor(idx){
  const palette = ["var(--navy)","#1E5AA8","#274B8C","#0B2C6B","#123B7A","#1B4A99","#0E3670","#16407E"];
  return palette[idx % palette.length];
}

/* ============== HELPERS ============== */
function el(html){
  const d = document.createElement("div");
  d.innerHTML = html.trim();
  return d.firstElementChild;
}
function today(){
  const d = new Date();
  return d.toLocaleDateString("id-ID",{day:"2-digit",month:"long",year:"numeric"});
}
function breadcrumbHtml(){
  const parts = [];
  if(state.toko) parts.push(state.toko);
  if(state.divisi) parts.push(state.divisi);
  if(state.divisi==="Comersil" && state.zona) parts.push(state.zona);
  if(state.divisi==="Comersil" && state.comersilType==="all") parts.push("Checklist All");
  if(state.divisi==="Comersil" && state.comersilType==="rackdisplay") parts.push("Rack & Display");
  if(state.divisi==="Comersil" && state.comersilType==="rackdisplay" && state.periode) parts.push(COMERSIL_PERIODS[state.periode].label.replace(" 5R CHECKLIST",""));
  if(state.sub) parts.push(subLabel());
  if(!parts.length) return "";
  return parts.map((p,i)=> (i>0?'<span class="sep">›</span>':'') + '<b>'+p+'</b>').join(" ");
}
function subLabel(){
  const map = {warehouse:"Warehouse",admin:"Admin",cspnd:"CS PnD",kasir:"Kasir",backoffice:"Back Office",toilet:"Toilet"};
  return map[state.sub] || "";
}

function renderApp(){
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(el(renderTopbar()));

  if(state.screen === "toko") app.appendChild(renderStepToko());
  else if(state.screen === "divisi") app.appendChild(renderStepDivisi());
  else if(state.screen === "zona") app.appendChild(renderStepZona());
  else if(state.screen === "jenis") app.appendChild(renderStepJenis());
  else if(state.screen === "periode") app.appendChild(renderStepPeriode());
  else if(state.screen === "subback") app.appendChild(renderStepChoice("Support Back","Pilih sub-divisi Support Back", SUBBACK_LIST, v=>{state.sub=v; state.screen="nama"; renderApp();}, ()=>{state.screen="divisi"; renderApp();}));
  else if(state.screen === "subfront") app.appendChild(renderStepChoice("Support Front","Pilih sub-divisi Support Front", SUBFRONT_LIST, v=>{state.sub=v; state.screen="nama"; renderApp();}, ()=>{state.screen="divisi"; renderApp();}));
  else if(state.screen === "subumum") app.appendChild(renderStepChoice("Umum","Pilih area Umum", SUBUMUM_LIST, v=>{state.sub=v; state.screen="nama"; renderApp();}, ()=>{state.screen="divisi"; renderApp();}));
  else if(state.screen === "nama") app.appendChild(renderStepNama());
  else if(state.screen === "checklist") app.appendChild(renderChecklistScreen());
}

function renderFiveRCarousel(){
  const box = el(`<div class="carousel-wrap">
    <div class="carousel-heading">Prinsip 5R</div>
    <div class="carousel-track" id="fiveRTrack"></div>
    <div class="carousel-dots" id="fiveRDots"></div>
  </div>`);
  const track = box.querySelector("#fiveRTrack");
  const dots = box.querySelector("#fiveRDots");

  FIVE_R_SLIDES.forEach(s=>{
    const slide = el(`<div class="carousel-slide">
      <img src="${s.img}" alt="${s.title}">
      <div class="cs-body">
        <span class="cs-num" style="background:${s.color}">${s.num}</span>
        <div class="cs-title">${s.title}</div>
        <div class="cs-desc">${s.desc}</div>
      </div>
    </div>`);
    track.appendChild(slide);
    dots.appendChild(el(`<span></span>`));
  });

  setTimeout(()=>{
    const dotEls = dots.querySelectorAll("span");
    if(dotEls[0]) dotEls[0].classList.add("active");
    track.addEventListener("scroll", ()=>{
      const slideW = track.firstElementChild.getBoundingClientRect().width + 12;
      const idx = Math.round(track.scrollLeft / slideW);
      dotEls.forEach((d,i)=> d.classList.toggle("active", i===idx));
    });

    /* Auto-scroll kontinu seperti kereta: bergerak terus dari kiri ke kanan,
       saat sampai di ujung langsung mulai lagi dari awal. */
    const SPEED_PX_PER_SEC = 32; // kecepatan ideal: cukup pelan untuk dibaca, tetap terlihat berjalan
    const RESUME_DELAY = 2500;   // jeda sebelum jalan lagi setelah user menyentuh carousel
    let rafId = null;
    let lastTs = null;
    let resumeTimer = null;
    let paused = false;

    function frame(ts){
      if(paused){ lastTs = null; return; }
      if(lastTs === null) lastTs = ts;
      const dt = (ts - lastTs) / 1000;
      lastTs = ts;

      const maxScroll = track.scrollWidth - track.clientWidth;
      if(maxScroll <= 0){ rafId = requestAnimationFrame(frame); return; }

      let next = track.scrollLeft + SPEED_PX_PER_SEC * dt;
      if(next >= maxScroll){
        next = 0; // sampai akhir -> mulai lagi dari awal, seperti kereta putar balik
      }
      track.scrollLeft = next;
      rafId = requestAnimationFrame(frame);
    }
    function startAuto(){
      if(rafId) return;
      paused = false;
      lastTs = null;
      rafId = requestAnimationFrame(frame);
    }
    function stopAuto(){
      paused = true;
      if(rafId){ cancelAnimationFrame(rafId); rafId = null; }
    }
    function pauseThenResume(){
      stopAuto();
      if(resumeTimer) clearTimeout(resumeTimer);
      resumeTimer = setTimeout(startAuto, RESUME_DELAY);
    }
    // Jeda otomatis saat user menyentuh/scroll manual, lalu jalan lagi
    track.addEventListener("pointerdown", pauseThenResume);
    track.addEventListener("wheel", pauseThenResume, {passive:true});
    track.addEventListener("touchstart", pauseThenResume, {passive:true});

    startAuto();
  },0);

  return box;
}

    <h2>${title}</h2>
    <p class="hint">${hint}</p>
    <div class="choice-grid" id="choiceGrid"></div>
  </div>`);
  const grid = card.querySelector("#choiceGrid");
  list.forEach((item,i)=>{
    const b = el(`<div class="choice-btn"><span class="txt"><span class="num">${i+1}</span>${item[1]}</span><span class="arrow">›</span></div>`);
    b.addEventListener("click", ()=> onPick(item[0]));
    grid.appendChild(b);
  });
  wrap.appendChild(card);
  return wrap;
}

function renderStepNama(){
  const wrap = el(`<div class="step-wrap"></div>`);
  const back = el(`<button class="back-link">&larr; Kembali</button>`);
  back.addEventListener("click", ()=>{
    if(state.divisi==="Comersil"){
      state.screen = (state.comersilType==="all") ? "jenis" : "periode";
    }
    else if(state.divisi==="Support Back") state.screen="subback";
    else if(state.divisi==="Support Front") state.screen="subfront";
    else state.screen="subumum";
    renderApp();
  });
  wrap.appendChild(back);

  const card = el(`<div class="card">
    <h2>Data Pelaksana</h2>
    <p class="hint">Lengkapi data berikut sebelum memulai checklist.</p>
    <label class="field-label">Nama Pelaksana</label>
    <input type="text" id="namaInput" placeholder="Masukkan nama lengkap" value="${state.nama||""}">
    <label class="field-label" style="margin-top:14px;">Area / Divisi</label>
    <input type="text" value="${areaSummary()}" disabled style="background:#f2f4f9;color:#666;">
    <button class="btn" id="btnMulai" ${state.nama?"":"disabled"}>Mulai Checklist</button>
  </div>`);
  const input = card.querySelector("#namaInput");
  const btn = card.querySelector("#btnMulai");
  input.addEventListener("input", ()=>{ btn.disabled = !input.value.trim(); });
  btn.addEventListener("click", ()=>{
    state.nama = input.value.trim();
    state.screen = "checklist";
    renderApp();
  });
  wrap.appendChild(card);
  return wrap;
}

function areaSummary(){
  if(state.divisi === "Comersil"){
    if(state.comersilType === "all") return `Comersil - ${state.zona} - Checklist All`;
    return `Comersil - ${state.zona} - ${COMERSIL_PERIODS[state.periode].label}`;
  }
  return `${state.divisi} - ${subLabel()}`;
}

/* ============== CHECKLIST SCREEN ============== */
function renderChecklistScreen(){
  const wrap = document.createDocumentFragment ? el('<div></div>') : el('<div></div>');
  const back = el(`<div class="step-wrap" style="padding-bottom:0;"><button class="back-link">&larr; Ganti data pelaksana</button></div>`);
  back.querySelector(".back-link").addEventListener("click", ()=>{ state.screen="nama"; renderApp(); });
  wrap.appendChild(back);

  if(state.divisi === "Comersil"){
    if(state.comersilType === "rackdisplay"){
      wrap.appendChild(renderComersilChecklist());
    } else {
      wrap.appendChild(renderGridChecklist("CHECKLIST 5R DIVISI COMMERCIAL MITRA10", COMMERCIAL_SECTIONS));
    }
  } else {
    let sections, title;
    if(state.sub==="warehouse"){ sections = WAREHOUSE_SECTIONS; title="CHECKLIST 5R DIVISI BACK STORE (WAREHOUSE)"; }
    else if(state.sub==="admin"){ sections = WAREHOUSE_SECTIONS; title="CHECKLIST 5R DIVISI BACK STORE (ADMIN)"; }
    else if(state.sub==="cspnd"){ sections = [FRONT_SECTIONS[0],FRONT_SECTIONS[1],FRONT_SECTIONS[3],FRONT_SECTIONS[4]]; title="CHECKLIST 5R FRONT STORE (CS & PnD)"; }
    else if(state.sub==="kasir"){ sections = [FRONT_SECTIONS[2]]; title="CHECKLIST 5R FRONT STORE (KASIR)"; }
    else if(state.sub==="backoffice"){ sections = BACKOFFICE_SECTIONS; title="CHECKLIST 5R BACK OFFICE & SUPPORT AREA"; }
    else if(state.sub==="toilet"){ sections = TOILET_SECTIONS; title="CHECKLIST 5R TOILET AREA"; }
    wrap.appendChild(renderGridChecklist(title, sections));
  }
  return wrap;
}

function renderGridChecklist(title, sections){
  const frag = el('<div></div>');
  const header = el(`<div class="checklist-header">
    <h1>${title}</h1>
    <div class="meta">
      <span>Toko: <b>${state.toko}</b></span>
      <span>Area: <b>${areaSummary()}</b></span>
      <span>Pelaksana: <b>${state.nama}</b></span>
      <span>Tanggal: <b>${today()}</b></span>
    </div>
    <div class="legend">
      ${R_COLS.map((c,i)=>`<span style="background:${R_COLORS[i]}">${c[0]}</span>`).join("")}
    </div>
  </div>`);
  frag.appendChild(header);

  let grandMax = 0, grandChecked = 0;
  const sectionScoreEls = [];

  sections.forEach((sec,si)=>{
    const [secTitle, items] = sec;
    const max = items.length * 5;
    grandMax += max;
    const block = el(`<div class="section-block">
      <div class="section-title" style="background:${sectionColor(si)}">
        <span>${si+1}. ${secTitle}</span>
        <span class="section-score" data-sec="${si}">0 / ${max}</span>
      </div>
      <div style="overflow-x:auto;">
      <table class="grid-table">
        <thead><tr>
          <th style="text-align:left;padding-left:14px;">Item Pemeriksaan</th>
          ${R_COLS.map(c=>`<th class="${c[1]}">${c[0]}</th>`).join("")}
        </tr></thead>
        <tbody>
          ${items.map((it,ii)=>`<tr>
            <td class="item-name"><span class="item-no">${ii+1}.</span> ${it}</td>
            ${R_COLS.map((c,ci)=>`<td><input type="checkbox" data-sec="${si}" data-col="${ci}"></td>`).join("")}
          </tr>`).join("")}
        </tbody>
      </table>
      </div>
    </div>`);
    frag.appendChild(block);
  });

  const totalCard = el(`<div class="total-card">
    <div class="score-big" id="totalScoreVal">0</div>
    <div class="score-label">dari maksimal ${grandMax} poin (<span id="totalPct">0%</span>)</div>
    <div class="kriteria-pill" id="kriteriaPill" style="background:#8a95ab;">Belum diisi</div>
  </div>`);
  frag.appendChild(totalCard);

  frag.appendChild(renderFooterActions());

  // attach listeners after insertion using event delegation on frag when mounted
  setTimeout(()=>{
    const checkboxes = document.querySelectorAll('.grid-table input[type=checkbox]');
    const secScoreEls = {};
    document.querySelectorAll('.section-score').forEach(e=> secScoreEls[e.dataset.sec]=e);

    function recompute(){
      let total = 0;
      const secTotals = {};
      checkboxes.forEach(cb=>{
        if(cb.checked){
          total++;
          secTotals[cb.dataset.sec] = (secTotals[cb.dataset.sec]||0)+1;
        }
      });
      const sectionLines = [];
      sections.forEach((sec,si)=>{
        const max = sec[1].length*5;
        const val = secTotals[si]||0;
        if(secScoreEls[si]) secScoreEls[si].textContent = val+" / "+max;
        sectionLines.push(`${si+1}. ${sec[0]}: ${val}/${max}`);
      });
      document.getElementById("totalScoreVal").textContent = total;
      const pct = grandMax? Math.round((total/grandMax)*100) : 0;
      document.getElementById("totalPct").textContent = pct+"%";
      const pill = document.getElementById("kriteriaPill");
      let label="Belum diisi", color="#8a95ab";
      if(total>0){
        if(pct>=90){label="SANGAT BAIK";color="#2E7D32";}
        else if(pct>=75){label="BAIK";color="#1E88E5";}
        else if(pct>=60){label="CUKUP";color="#FB8C00";}
        else{label="PERLU PERBAIKAN";color="#E53935";}
      }
      pill.textContent = label;
      pill.style.background = color;
      lastResult = {
        title: title,
        area: areaSummary(),
        pelaksana: state.nama,
        tanggal: today(),
        total: total, max: grandMax, pct: pct, label: label,
        lines: sectionLines
      };
    }
    checkboxes.forEach(cb=> cb.addEventListener("change", recompute));
    recompute();
  },0);

  return frag;
}

function renderComersilChecklist(){
  const frag = el('<div></div>');
  const p = COMERSIL_PERIODS[state.periode];
  const header = el(`<div class="checklist-header">
    <h1>FORM CEKLIS 5R TERINTEGRASI</h1>
    <div class="meta">
      <span>Toko: <b>${state.toko}</b></span>
      <span>Area: <b>Rack & Display Floor - ${state.zona}</b></span>
      <span>Pelaksana: <b>${state.nama}</b></span>
      <span>Tanggal: <b>${today()}</b></span>
    </div>
    <div class="legend"><span style="background:var(--navy)">${p.label}</span><span style="background:#7c8aa8">${p.sub}</span></div>
  </div>`);
  frag.appendChild(header);

  let totalItems = 0;
  p.groups.forEach(g=> totalItems += g[2].length);

  p.groups.forEach((g,gi)=>{
    const [gname, gcolor, items] = g;
    const block = el(`<div class="group-block">
      <div class="group-head" style="background:${gcolor}">${gname}</div>
      <div class="group-items">
        ${items.map((it,ii)=>`<div class="g-item"><span>${it}</span><input type="checkbox" data-g="${gi}" data-i="${ii}"></div>`).join("")}
      </div>
    </div>`);
    frag.appendChild(block);
  });

  // Tindakan korektif
  const corr = el(`<div class="corrective-table">
    <table>
      <thead><tr><th style="width:6%;">No</th><th>Temuan</th><th>Tindakan Korektif</th><th style="width:16%;">PIC</th><th style="width:16%;">Due Date</th></tr></thead>
      <tbody>
        ${[1,2,3].map(n=>`<tr>
          <td style="text-align:center;">${n}</td>
          <td><input type="text" placeholder="Temuan ${n}"></td>
          <td><input type="text" placeholder="Tindakan korektif"></td>
          <td><input type="text" placeholder="PIC"></td>
          <td><input type="date"></td>
        </tr>`).join("")}
      </tbody>
    </table>
  </div>`);
  frag.appendChild(corr);

  // Otorisasi
  const autho = el(`<div class="autho-block"><div class="autho-grid">
    <div class="autho-card">
      <h4>STAF (Pelaksana)</h4>
      <label>Nama</label><input type="text" value="${state.nama}" disabled style="background:#f2f4f9;">
      <label>Tanggal</label><input type="date">
      <label>TTD (ketik nama sebagai tanda tangan)</label><input type="text" placeholder="TTD">
    </div>
    <div class="autho-card">
      <h4>TEAM LEADER (Verifikator)</h4>
      <label>Nama</label><input type="text" placeholder="Nama Team Leader">
      <label>Tanggal</label><input type="date">
      <label>TTD (ketik nama sebagai tanda tangan)</label><input type="text" placeholder="TTD">
    </div>
  </div></div>`);
  frag.appendChild(autho);

  const legend = el(`<div class="kelulusan-legend">
    <span style="background:#2E7D32;">95-100% Excellent</span>
    <span style="background:#FBC02D;color:#5a4a00;">90-94% Good</span>
    <span style="background:#FB8C00;">85-89% Warning</span>
    <span style="background:#E53935;">&lt;85% Action Plan Wajib</span>
  </div>`);
  frag.appendChild(legend);

  const totalCard = el(`<div class="total-card">
    <div class="score-big" id="totalScoreVal">0</div>
    <div class="score-label">dari ${totalItems} item (<span id="totalPct">0%</span>)</div>
    <div class="kriteria-pill" id="kriteriaPill" style="background:#8a95ab;">Belum diisi</div>
  </div>`);
  frag.appendChild(totalCard);

  frag.appendChild(renderFooterActions());

  setTimeout(()=>{
    const checkboxes = document.querySelectorAll('.group-items input[type=checkbox]');
    function recompute(){
      let checked = 0;
      const groupTotals = {};
      checkboxes.forEach(cb=>{
        if(cb.checked){
          checked++;
          groupTotals[cb.dataset.g] = (groupTotals[cb.dataset.g]||0)+1;
        }
      });
      document.getElementById("totalScoreVal").textContent = checked;
      const pct = totalItems? Math.round((checked/totalItems)*100) : 0;
      document.getElementById("totalPct").textContent = pct+"%";
      const pill = document.getElementById("kriteriaPill");
      let label="Belum diisi", color="#8a95ab";
      if(checked>0){
        if(pct>=95){label="EXCELLENT";color="#2E7D32";}
        else if(pct>=90){label="GOOD";color="#FBC02D";}
        else if(pct>=85){label="WARNING";color="#FB8C00";}
        else{label="ACTION PLAN WAJIB";color="#E53935";}
      }
      pill.textContent = label;
      pill.style.background = color;
      const groupLines = p.groups.map((g,gi)=> `${g[0]}: ${groupTotals[gi]||0}/${g[2].length}`);
      lastResult = {
        title: `FORM CEKLIS 5R TERINTEGRASI (${p.label})`,
        area: `Rack & Display Floor - ${state.zona}`,
        pelaksana: state.nama,
        tanggal: today(),
        total: checked, max: totalItems, pct: pct, label: label,
        lines: groupLines
      };
    }
    checkboxes.forEach(cb=> cb.addEventListener("change", recompute));
    recompute();
  },0);

  return frag;
}

function buildWaMessage(){
  if(!lastResult) return "";
  const r = lastResult;
  let msg = `*${r.title}*\n`;
  msg += `Toko: ${state.toko}\n`;
  msg += `Area: ${r.area}\n`;
  msg += `Pelaksana: ${r.pelaksana}\n`;
  msg += `Tanggal: ${r.tanggal}\n\n`;
  msg += `*Rincian Skor:*\n`;
  r.lines.forEach(l=> msg += `- ${l}\n`);
  msg += `\n*Total Skor: ${r.total} / ${r.max} (${r.pct}%)*\n`;
  msg += `*Status: ${r.label}*`;
  return msg;
}

function renderFooterActions(){
  const bar = el(`<div class="footer-actions">
    <button class="btn btn-secondary" id="btnPrint" style="flex:1;">🖨 PDF</button>
    <button class="btn" id="btnWa" style="flex:1;background:#25D366;">📲 Kirim WA</button>
    <button class="btn btn-secondary" id="btnSelesai" style="flex:1;">✔ Selesai</button>
  </div>`);
  setTimeout(()=>{
    document.getElementById("btnPrint").addEventListener("click", ()=> window.print());
    document.getElementById("btnWa").addEventListener("click", ()=>{
      const text = buildWaMessage();
      if(!text){ alert("Isi checklist terlebih dahulu sebelum mengirim."); return; }
      const url = "https://wa.me/?text=" + encodeURIComponent(text);
      window.open(url, "_blank");
    });
    document.getElementById("btnSelesai").addEventListener("click", ()=>{
      if(confirm("Selesaikan checklist ini dan kembali ke halaman awal?")){
        state = {screen:"toko", toko:"", divisi:"", sub:"", zona:"", comersilType:"", periode:"", nama:""};
        lastResult = null;
        renderApp();
      }
    });
  },0);
  return bar;
}

/* ============== INIT ============== */
renderApp();
document.getElementById("appFooter").textContent = `© ${new Date().getFullYear()} Powered by Support Back TLC`;
</script>
